name: Snapshot collect

# 주기 수집 → snapshot.json commit-back. Render 무료티어 sleep/ephemeral FS 회피.
# Phase 1: DATA_PROVIDER=auto 면 키 없이 Open-Meteo 로 실데이터 수집(secrets 불필요).
# Phase 2: KHOA/KMA Secrets 설정 시 자동으로 실측·특보 경로로 전환.

on:
  schedule:
    - cron: "0 */6 * * *" # 6시간마다
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Collect snapshot
        env:
          KHOA_API_KEY: ${{ secrets.KHOA_API_KEY }}
          KHOA_TIDE_API_KEY: ${{ secrets.KHOA_TIDE_API_KEY }}
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          USE_SNAPSHOT_ONLY: "0"
        run: python -m app.ingest.collect
      - name: Commit-back if changed
        run: |
          cd ..
          if [[ -n "$(git status --porcelain backend/data/snapshot.json)" ]]; then
            git config user.name "snapshot-bot"
            git config user.email "snapshot-bot@users.noreply.github.com"
            git add backend/data/snapshot.json
            git commit -m "chore(snapshot): refresh marine data $(date -u +%FT%TZ)"
            git push
          else
            echo "no snapshot change"
          fi
